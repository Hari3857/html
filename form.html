<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JOB APPLICATION FORM</h1>
    <form  action="../Basics/anchortag.htmls" method="dialog" style="height: 780px; width: 500px; background-color: rgba(218, 177, 164, 0.614);">
        <fieldset>
            <legend>JOB APPLICATION FORM</legend>
        <b><label for="fname">Firstname:</label></b>
        <input type="text" name="fname" id="fname" 
        minlength="6" maxlength="18" autocomplete required placeholder="enter first name" ><br><br>
        <b><label for="">Username:</label></b>
        <input type="text" name="" id="" autofocus><br><br>
        <b><label for="">Email:</label></b>
        <input type="email" name="" id="" value="abc@123" required><br><br>
        <b><label for="">Password:</label></b>
        <input type="password" name="" id="" minlength="8" maxlength="8" pattern="[A-Z]{1}[a-z]{4}[0-9]{3}" ><br><br>
        <b><label for="">Age:</label></b>
        <input type="number" name="" id="" min="20" max="30"><br><br>
        <b><label for="">Mobilenumber:</label></b>
        <input type="tel" name="" id="" minlength="10" maxlength="10"><br><br>
        <b><label for="">Gender:</label></b>
        <input type="radio" name="gender" id="" value="Female">Female
        <input type="radio" name="gender" id="" value="Male" checked >Male
        <input type="radio" name="gender" id="" value="Others">Others <br><br>
        <b><label for="">Skills:</label></b>
        <input type="checkbox" name="" id="">Python
        <input type="checkbox" name="" id="">c++
        <input type="checkbox" name="" id="">SQL <br>
        <label for="">Resume:</label> 
        <input type="file" name="" id="" disabled><br><br>
        <label for="">Github url:</label>
        <input type="url" name="" id="" readonly> <br><br>  
        <label for="">Educationals details:</label>
        <input type="marks" name="" id=""><br>
        <label for="">Degree:</label>
        <select name="" id="" >
            <option value="">--select--</option>
            <option value="">Mtech</option>
            <option value="">Btech</option>
            <option value="">Bsc</option>
        </select> <br><br>
        <label for="">Stream:</label>
        <input type="text" name="" id="" list="Stream">
        <datalist id="Stream">
            <option value="DS">DS</option>
            <option value="MATHS">MATHS</option>
            <option value="ECE">ECE</option>
            <option value="CSE">CSE</option>
        </datalist> <br><br>
        <label for="">Introduction:</label>
        <textarea name="" id="" cols="30" rows="10" placeholder="10"></textarea><BR></BR>
        <input type="submit" name="" id=""><br>
        <button>EWWWWW!!!</button>
        </fieldset>
    </form>
</body>
</html>
